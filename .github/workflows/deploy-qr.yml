name: Deploy QR Generator to Render

on:
  push:
    branches: [main]
    paths:
      - 'qr-generator/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            https://api.render.com/v1/services/srv-d8l6vem7r5hc739n7ci0/deploys
