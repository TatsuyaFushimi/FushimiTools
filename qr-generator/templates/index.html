<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlareQR</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
      background: #f4f4f4;
      min-height: 100vh;
      padding: 24px;
      color: #111;
    }

    .container { max-width: 760px; margin: 0 auto; }

    header { text-align: center; margin-bottom: 28px; }

    .logo { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 6px; }

    .logo-icon {
      width: 44px; height: 44px;
      background: #111;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }

    .logo-name { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }

    .subtitle { font-size: 13px; color: #888; }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,.07);
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 14px; font-weight: 700;
      color: #888;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: #333; }

    .field { margin-bottom: 12px; }

    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    input[type=text], input[type=password], input[type=url] {
      width: 100%;
      padding: 10px 13px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
      transition: border-color .15s;
    }

    input:focus { border-color: #111; }

    .btn {
      padding: 11px 20px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s, opacity .15s;
    }

    .btn-dark { background: #111; color: #fff; }
    .btn-dark:hover { background: #333; }
    .btn-dark:disabled { background: #ccc; cursor: not-allowed; }
    .btn-full { width: 100%; }

    .btn-sm {
      padding: 6px 14px;
      font-size: 12px;
      border-radius: 7px;
    }

    .btn-outline {
      background: #fff;
      color: #111;
      border: 1.5px solid #ddd;
    }

    .btn-outline:hover { background: #f4f4f4; }

    /* QR 結果 */
    .qr-result {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #f0f0f0;
    }

    .qr-result img { width: 120px; height: 120px; border-radius: 10px; border: 1px solid #eee; }

    .qr-info { flex: 1; }

    .qr-id {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #f4f4f4;
      border-radius: 7px;
      padding: 5px 10px;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .qr-id strong { font-family: monospace; font-size: 14px; }

    .copy-btn {
      font-size: 11px; padding: 2px 7px;
      background: #fff; border: 1px solid #ddd;
      border-radius: 4px; cursor: pointer; font-weight: 600;
    }

    .qr-url {
      font-size: 12px; color: #888;
      background: #f8f8f8; border-radius: 7px;
      padding: 7px 10px; margin-bottom: 10px;
      word-break: break-all;
    }

    .btn-row { display: flex; gap: 8px; }

    /* 一覧 */
    .search-wrap { position: relative; margin-bottom: 16px; }

    .search-wrap input { padding-right: 14px; }

    .search-wrap::before {
      content: '🔍';
      position: absolute;
      left: 12px; top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
    }

    .search-wrap input { padding-left: 36px; }

    .qr-list { display: flex; flex-direction: column; gap: 8px; }

    .qr-item {
      border: 1.5px solid #f0f0f0;
      border-radius: 12px;
      overflow: hidden;
    }

    .qr-item-row {
      display: grid;
      grid-template-columns: 1fr 80px auto auto;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: #fff;
    }

    .item-title { font-size: 14px; font-weight: 700; }
    .item-url { font-size: 11px; color: #aaa; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-creator { font-size: 12px; color: #666; }
    .item-id { font-size: 11px; color: #bbb; font-family: monospace; }

    /* 編集パネル */
    .edit-panel {
      background: #fafafa;
      border-top: 1.5px solid #f0f0f0;
      padding: 16px;
      display: none;
    }

    .edit-panel.open { display: block; }

    .edit-panel-inner { display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px; align-items: end; }

    .edit-panel label { font-size: 12px; }

    .edit-panel input { padding: 8px 11px; font-size: 13px; }

    .msg { font-size: 13px; padding: 8px 12px; border-radius: 8px; margin-top: 10px; }
    .msg-ok  { background: #e8f5e9; color: #2e7d32; }
    .msg-err { background: #fde0e0; color: #c00; }

    .hidden { display: none !important; }

    .empty-state { text-align: center; color: #bbb; font-size: 13px; padding: 32px; }

    .back-link {
      position: fixed; top: 16px; left: 16px;
      font-size: 13px; color: #888; text-decoration: none;
      background: rgba(255,255,255,.9); padding: 6px 12px;
      border-radius: 20px; backdrop-filter: blur(4px);
      box-shadow: 0 1px 6px rgba(0,0,0,.1); transition: color .15s;
    }

    .back-link:hover { color: #111; }

    @media (max-width: 600px) {
      .qr-item-row { grid-template-columns: 1fr auto; }
      .item-creator, .item-id { display: none; }
      .edit-panel-inner { grid-template-columns: 1fr; }
      .row-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<a class="back-link" href="https://TatsuyaFushimi.github.io/FushimiTools/" target="_blank">← ツール一覧</a>

<div class="container">
  <header>
    <div class="logo">
      <div class="logo-icon">⬛</div>
      <span class="logo-name">FlareQR</span>
    </div>
    <p class="subtitle">動的 QR コード — リンク先をあとから変更できます</p>
  </header>

  <!-- 作成 -->
  <div class="card">
    <div class="card-title">新しいQRを作成</div>

    <div class="field">
      <label>タイトル</label>
      <input type="text" id="c-title" placeholder="例: 会社紹介ページ用QR">
    </div>
    <div class="field">
      <label>遷移先 URL</label>
      <input type="url" id="c-url" placeholder="https://example.com">
    </div>
    <div class="row-2">
      <div class="field">
        <label>パスワード</label>
        <input type="password" id="c-pw" placeholder="編集時に使用">
      </div>
      <div class="field">
        <label>作成者名</label>
        <input type="text" id="c-creator" placeholder="例: 伏見">
      </div>
    </div>

    <button class="btn btn-dark btn-full" id="create-btn" onclick="createQR()">QRコードを生成</button>

    <div class="qr-result hidden" id="create-result">
      <img id="qr-img" src="" alt="QR">
      <div class="qr-info">
        <div class="qr-id">
          管理ID: <strong id="qr-id-display"></strong>
          <button class="copy-btn" onclick="copyId()">コピー</button>
        </div>
        <div class="qr-url" id="qr-url-display"></div>
        <div class="btn-row">
          <button class="btn btn-dark btn-sm" onclick="downloadQR()">ダウンロード</button>
          <button class="btn btn-outline btn-sm" onclick="resetCreate()">新しく作る</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 一覧 -->
  <div class="card">
    <div class="card-title">作成済みQR一覧</div>
    <div class="search-wrap">
      <input type="text" id="search-input" placeholder="タイトル・作成者で絞り込み" oninput="filterList()">
    </div>
    <div class="qr-list" id="qr-list">
      <div class="empty-state">読み込み中...</div>
    </div>
  </div>
</div>

<script>
  let allItems = [];
  let currentQrB64 = '';
  let currentId = '';

  // ---- 起動時に一覧取得 ----
  loadList();

  async function loadList() {
    try {
      const res = await fetch('/api/list');
      const d = await res.json();
      allItems = d.items || [];
      renderList(allItems);
    } catch {
      document.getElementById('qr-list').innerHTML = '<div class="empty-state">読み込みに失敗しました</div>';
    }
  }

  function filterList() {
    const q = document.getElementById('search-input').value.trim().toLowerCase();
    const filtered = q
      ? allItems.filter(r => r.title.toLowerCase().includes(q) || r.creator.toLowerCase().includes(q))
      : allItems;
    renderList(filtered);
  }

  function renderList(items) {
    const el = document.getElementById('qr-list');
    if (!items.length) {
      el.innerHTML = '<div class="empty-state">該当するQRコードがありません</div>';
      return;
    }
    el.innerHTML = items.map(r => `
      <div class="qr-item" id="item-${r.id}">
        <div class="qr-item-row">
          <div>
            <div class="item-title">${escHtml(r.title)}</div>
            <div class="item-url">${escHtml(r.destination_url)}</div>
          </div>
          <div class="item-creator">${escHtml(r.creator)}</div>
          <div class="item-id">${r.id}</div>
          <button class="btn btn-outline btn-sm" onclick="toggleEdit('${r.id}')">編集</button>
        </div>
        <div class="edit-panel" id="edit-${r.id}">
          <div class="edit-panel-inner">
            <div class="field">
              <label>パスワード</label>
              <input type="password" id="pw-${r.id}" placeholder="作成時のパスワード">
            </div>
            <div class="field">
              <label>新しい遷移先 URL</label>
              <input type="url" id="newurl-${r.id}" placeholder="https://...">
            </div>
            <button class="btn btn-dark btn-sm" onclick="saveEdit('${r.id}')">保存</button>
          </div>
          <div class="msg hidden" id="msg-${r.id}"></div>
        </div>
      </div>
    `).join('');
  }

  function toggleEdit(id) {
    const panel = document.getElementById('edit-' + id);
    panel.classList.toggle('open');
  }

  async function saveEdit(id) {
    const password = document.getElementById('pw-' + id).value.trim();
    const new_url = document.getElementById('newurl-' + id).value.trim();
    const msg = document.getElementById('msg-' + id);

    msg.classList.add('hidden');
    try {
      const res = await fetch('/api/edit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, password, new_url }),
      });
      const d = await res.json();
      msg.className = 'msg';
      msg.classList.remove('hidden');
      if (d.ok) {
        msg.classList.add('msg-ok');
        msg.textContent = '✓ 変更しました！QRコードはそのまま使えます。';
        // ローカルデータも更新
        const item = allItems.find(r => r.id === id);
        if (item) item.destination_url = new_url;
        document.querySelector(`#item-${id} .item-url`).textContent = new_url;
        document.getElementById('newurl-' + id).value = '';
      } else {
        msg.classList.add('msg-err');
        msg.textContent = d.error || 'エラーが発生しました';
      }
    } catch {
      msg.className = 'msg msg-err';
      msg.classList.remove('hidden');
      msg.textContent = '通信エラーが発生しました';
    }
  }

  // ---- 作成 ----
  async function createQR() {
    const title   = document.getElementById('c-title').value.trim();
    const url     = document.getElementById('c-url').value.trim();
    const password = document.getElementById('c-pw').value.trim();
    const creator = document.getElementById('c-creator').value.trim();
    const btn = document.getElementById('create-btn');

    btn.disabled = true;
    btn.textContent = '生成中...';

    try {
      const res = await fetch('/api/create', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, url, password, creator }),
      });
      const d = await res.json();
      if (d.error) { alert(d.error); return; }

      currentQrB64 = d.qr_image;
      currentId = d.id;

      document.getElementById('qr-img').src = 'data:image/png;base64,' + d.qr_image;
      document.getElementById('qr-id-display').textContent = d.id;
      document.getElementById('qr-url-display').textContent = d.redirect_url;
      document.getElementById('create-result').classList.remove('hidden');
      document.getElementById('create-btn').classList.add('hidden');
      ['c-title','c-url','c-pw','c-creator'].forEach(id => document.getElementById(id).disabled = true);

      // 一覧を再取得
      loadList();
    } catch {
      alert('通信エラーが発生しました');
    } finally {
      btn.disabled = false;
      btn.textContent = 'QRコードを生成';
    }
  }

  function downloadQR() {
    const a = document.createElement('a');
    a.href = 'data:image/png;base64,' + currentQrB64;
    a.download = `qr-${currentId}.png`;
    a.click();
  }

  function copyId() {
    navigator.clipboard.writeText(currentId);
    const btn = event.target;
    btn.textContent = 'コピー済！';
    setTimeout(() => btn.textContent = 'コピー', 1500);
  }

  function resetCreate() {
    ['c-title','c-url','c-pw','c-creator'].forEach(id => {
      document.getElementById(id).value = '';
      document.getElementById(id).disabled = false;
    });
    document.getElementById('create-result').classList.add('hidden');
    document.getElementById('create-btn').classList.remove('hidden');
    currentQrB64 = '';
    currentId = '';
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
